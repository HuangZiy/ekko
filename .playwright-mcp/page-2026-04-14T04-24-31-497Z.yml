          - heading "风险与注意事项" [level=2] [ref=e780]
          - list [ref=e781]:
            - listitem [ref=e782]:
              - paragraph [ref=e783]:
                - strong [ref=e784]: ErrorBoundary 是 class component
                - text: ：不能使用
                - code [ref=e785]: "`useTranslation`"
                - text: hook。方案：直接
                - code [ref=e786]: "`import i18n from '../i18n'`"
                - text: 后调用
                - code [ref=e787]: "`i18n.t()`"
                - text: ，或用
                - code [ref=e788]: "`withTranslation`"
                - text: HOC 包装。推荐前者，改动最小。
            - listitem [ref=e789]:
              - paragraph [ref=e790]:
                - strong [ref=e791]: STATUS_LABELS 删除的影响面
                - text: ：
                - code [ref=e792]: "`IssueDetail.tsx`"
                - text: 直接导入了
                - code [ref=e793]: "`STATUS_LABELS`"
                - text: ，删除后需确保所有引用点都改为
                - code [ref=e794]: "`t('status.xxx')`"
                - text: 。用 grep 确认无遗漏。
            - listitem [ref=e795]:
              - paragraph [ref=e796]:
                - strong [ref=e797]: 插值语法
                - text: ：带变量的文本（如
                - code [ref=e798]: "`{done}/{total} done ({pct}%)`"
                - text: ）需使用 i18next 插值语法
                - code [ref=e799]: "`{{done}}/{{total}} done ({{pct}}%)`"
                - text: ，注意双花括号。
            - listitem [ref=e800]:
              - paragraph [ref=e801]:
                - strong [ref=e802]: toolbarActions 是模块级常量
                - text: ：
                - code [ref=e803]: "`MarkdownEditor.tsx`"
                - text: 中的
                - code [ref=e804]: "`toolbarActions`"
                - text: 数组在模块加载时初始化，其
                - code [ref=e805]: "`label`"
                - text: 字段如果改为
                - code [ref=e806]: "`t()`"
                - text: 调用，需要确保在组件渲染时才求值（可改为 key，在渲染时
                - code [ref=e807]: "`t(action.labelKey)`"
                - text: ）。
            - listitem [ref=e808]:
              - paragraph [ref=e809]:
                - strong [ref=e810]: locale 文件 key 一致性
                - text: ：两个 locale 文件必须保持 key 完全同步，否则 fallback 到英文时可能出现不一致。建议用脚本或 diff 工具校验。
            - listitem [ref=e811]:
              - paragraph [ref=e812]:
                - strong [ref=e813]:
                  - code [ref=e814]: "`parseEvidence`"
                  - text: 函数中的正则
                - text: ：该函数用正则匹配
                - code [ref=e815]: "`## Agent Done 证据`"
                - text: 等中文标题来解析 content。国际化后如果 content 本身是用户/agent 生成的 markdown，这些正则不应改动——它们匹配的是数据内容而非 UI 文本。只需替换
                - code [ref=e816]: "`EvidencePanel`"
                - text: 中的显示文本。

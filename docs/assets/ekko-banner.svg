  <!-- Flow arrows -->
  <g opacity="0.12">
    <path d="M150 200 L300 200 L300 100 L450 100" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="6 4"/>
    <path d="M450 100 L600 100 L600 200 L750 200" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="6 4"/>
    <path d="M750 200 L900 200 L900 100 L1050 100" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="6 4"/>
  </g>
  <!-- Title -->
  <text x="600" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#accent)">Ekko</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#666" font-weight="400">
    Master of Time for Long-Running Harness
  </text>
  <!-- Tagline -->
  <text x="600" y="210" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#555" font-weight="400">
    Plan · Implement · Evaluate · Review · Iterate
  </text>
  <!-- Bottom line -->
  <rect x="400" y="240" width="400" height="1" fill="url(#accent)" opacity="0.3" rx="0.5"/>

    <circle cx="100" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="200" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="300" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="400" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="500" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="600" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="700" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="800" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="900" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="1000" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="1100" cy="150" r="1.5" fill="#a78bfa"/>
    <circle cx="100" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="200" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="300" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="400" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="500" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="600" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="700" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="800" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="900" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="1000" cy="250" r="1.5" fill="#60a5fa"/>
    <circle cx="1100" cy="250" r="1.5" fill="#60a5fa"/>
